<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Gallery</title>
<style>
body {
    font-family: monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

#game-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center; /* Center images */
    gap: 10px; /* Reduce gap for more items */
    width: 100%;
    max-width: 1200px; /* Limit width for large screens */
}

/* Responsive flexible grid */
.game-item {
    flex: 1 1 auto; /* Grow and shrink dynamically */
    max-width: min(25%, 200px); /* Fit up to 4 per row on wide screens */
    aspect-ratio: 635 / 291; /* Maintain aspect ratio */
    background-size: cover;
    background-position: center;
    border-radius: 10px;
    box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    text-align: center;
    transition: transform 0.2s;
}

.game-item:hover {
    transform: scale(1.03);
}

.game-title {
    color: white;
    font-size: clamp(10px, 1vw, 14px); /* Responsive text */
    text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
    font-weight: bold;
    padding: 5px;
    background: rgba(0, 0, 0, 0.6);
    width: 100%;
    border-bottom-left-radius: 10px;
    border-bottom-right-radius: 10px;
}

/* Responsive layout adjustments */
@media (max-width: 1024px) {
    .game-item {
        max-width: min(33%, 180px); /* 3 per row */
    }
}

@media (max-width: 768px) {
    .game-item {
        max-width: min(50%, 150px); /* 2 per row */
    }
}

@media (max-width: 480px) {
    .game-item {
        max-width: 100%; /* 1 per row on small screens */
    }
}
</style>
</head>
<body>

    <div id="game-container"></div>


</body>
<script>
fetch("https://raw.githubusercontent.com/AkiraArtuhaxis/JackboxUtility-Server-en/main/api/v2/packs.json") // Replace with the actual API URL
    .then(response => response.json()) // Parse JSON response
    .then(data => {
        const container = document.getElementById("game-container"); // Parent div to hold game items

        data.packs.forEach(pack => {
            pack.games.forEach(game => {
                const gameDiv = document.createElement("div"); // Create a new div for each game
                gameDiv.classList.add("game-item"); // Add a class for styling
                
                // Set background image
                gameDiv.style.backgroundImage = `url(${game.background})`;
                gameDiv.style.backgroundSize = "cover";
                gameDiv.style.backgroundPosition = "center";

                // Add game name
                const title = document.createElement("p");
                title.innerText = game.name;
                gameDiv.appendChild(title);

                container.appendChild(gameDiv); // Append to container
            });
        });
    })
    .catch(error => console.error("Error fetching data:", error));
</script>
</html>
