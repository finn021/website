<!DOCTYPE html>
<html lang="{{ page.lang | default: "en" }}">
  {%- include head.html -%}
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <body a="{{ site.theme_config.appearance | default: "auto" }}">
    <main class="page-content" aria-label="Content">
      <div class="w">
	<button id="dark-mode-toggle" onclick="toggleDarkMode()">
 	<span class="material-icons" id="dark-mode-icon">wb_sunny</span>
	</button>
        {{ content }}
      </div>
    </main>

    {%-if site.goat_counter and jekyll.environment == "production"-%}
      {%-include goat_counter.html-%}
    {%-endif-%}

    {% if page.custom_js %}
      {% for js_file in page.custom_js %}
        <script type="text/javascript" src="{{ site.baseurl }}/assets/js/{{ js_file }}.js"></script>
	<script>function toggleDarkMode() {
  		var element = document.body;
 		element.classList.toggle("dark-mode");

  		var icon = document.getElementById("dark-mode-icon");
  		if (element.classList.contains("dark-mode")) {
    			icon.textContent = "brightness_3"; // Moon icon
  		} else {
    		icon.textContent = "wb_sunny"; // Sun icon
  		}
	}
	</script>
      {% endfor %}
    {% endif %}
  </body>
</html>
