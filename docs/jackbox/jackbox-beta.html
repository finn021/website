<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackbox Games</title>
    <style>
        body {
            display: flex;
            flex-direction: row;
            margin: 0;
            height: 100vh;
        }
        .left, .right {
            flex: 1;
            overflow: scroll;
        }
        .left iframe, .right iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        @media (orientation: portrait) {
            body {
                flex-direction: column;
            }
            .right iframe {
                width: 100%;
                height: 0;
                padding-bottom: 56.25%; /* 16:9 aspect ratio */
                position: relative;
            }
            .right iframe iframe {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }
        }
    </style>
    <script src="id.js"></script>
</head>
<body>
    <div class="left">
        <iframe src="https://jackbox.tv"></iframe>
    </div>
    <div class="right">
        <iframe id="streamPlayer"></iframe>
    </div>
</body>

</script>
</html>
