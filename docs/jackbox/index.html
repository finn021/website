<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackbox and YouTube Live Stream</title>
    <style>
        body {
            display: flex;
            flex-direction: row;
            margin: 0;
            height: 100vh;
        }
        .left, .right {
            flex: 1;
            overflow: hidden;
        }
        .left iframe, .right iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        @media (orientation: portrait) {
            body {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="left">
        <iframe src="https://jackbox.tv"></iframe>
    </div>
    <div class="right">
        <iframe src="https://www.youtube.com/embed/live_stream?channel=YOUR_CHANNEL_ID"></iframe>
    </div>
</body>
</html>
