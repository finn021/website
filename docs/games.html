<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game List</title>
    <style>
    	@import url('https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap');
        body {
            font-family: "Raleway", sans-serif;
  			font-optical-sizing: auto;
  			font-weight: 400;
  			font-style: normal;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .card {
            position: relative;
            width: 300px;
            height: 400px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-content {
            position: absolute;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }
        .card h3 {
            margin: 0;
            font-size: 1.5em;
        }
        .card p {
            margin: 10px 0 0;
            font-size: 1em;
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div onclick="location.href='games/slope.html';" class="card">
            <img src="assets/img/games/slope.jpeg" alt="Slope">
            <div class="card-content">
                <h3>Slope</h3>
                <p>Keep the ball from rolling off the track and colliding with obstacles.</p>
            </div>
        </div>
        <!-- Add more cards as needed -->
    </div>
</body>
</html>
